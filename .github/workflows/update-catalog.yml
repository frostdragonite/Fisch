name: Update Catalog from Fischipedia

on:
  schedule:
    - cron: '0 6 * * 0'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install scraper dependencies
        run: pip install -r scraper/requirements.txt

      - name: Scrape wiki data
        run: python scraper/scrape.py

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          title: 'chore: update catalog from fischipedia'
          commit-message: 'chore: update catalog from fischipedia'
          body: 'Automated weekly catalog refresh from fischipedia.org'
          branch: automated/catalog-update
